<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0a08" />
  <title>命运骰桌 · 混合骰池</title>
  <style>
    :root {
      --theme-bg0: #030303;
      --theme-bg1: #0b0a08;
      --theme-panel: rgba(12, 11, 9, .91);
      --theme-panel-2: rgba(18, 16, 12, .96);
      --theme-accent: #b9954f;
      --theme-accent-soft: #e0c990;
      --theme-metal: #c9a75e;
      --theme-text: #eee9dd;
      --theme-muted: #9d988d;
      --theme-line: rgba(199, 163, 88, .20);
      --theme-line-strong: rgba(216, 181, 104, .48);
      --theme-glow: rgba(190, 151, 73, .14);
      --theme-button: linear-gradient(100deg, #8e6d31 0%, #c5a45e 50%, #e1cc98 120%);
      --theme-result: linear-gradient(180deg, #f4efe4 0%, #d3b879 46%, #9b762f 100%);
      --danger: #ff8fa3;
      --shadow: 0 24px 70px rgba(0, 0, 0, .38);
      --radius-xl: 28px;
      font-synthesis-weight: none;
    }

    body[data-theme="jade"] {
      --theme-bg0: #06080d; --theme-bg1: #0a1016;
      --theme-panel: rgba(10,14,20,.82); --theme-panel-2: rgba(14,20,28,.95);
      --theme-accent: #86e2c4; --theme-accent-soft: #b5f2df; --theme-metal: #e3c67a;
      --theme-text: #edf7f5; --theme-muted: #93a9a5;
      --theme-line: rgba(147,229,202,.15); --theme-line-strong: rgba(147,229,202,.38);
      --theme-glow: rgba(86,205,170,.12);
      --theme-button: linear-gradient(100deg,#75dabc 0%,#b5f2df 48%,#ebd59d 120%);
      --theme-result: linear-gradient(180deg,#fbfffe 0%,#b5f2df 44%,#78cfb4 100%);
    }
    body[data-theme="moon"] {
      --theme-bg0:#080a10; --theme-bg1:#121722;
      --theme-panel:rgba(14,18,27,.86); --theme-panel-2:rgba(21,27,39,.96);
      --theme-accent:#b8d3e7; --theme-accent-soft:#edf7ff; --theme-metal:#c8d1da;
      --theme-text:#f2f6fa; --theme-muted:#9caab7;
      --theme-line:rgba(188,215,235,.17); --theme-line-strong:rgba(202,228,246,.42);
      --theme-glow:rgba(130,181,221,.13);
      --theme-button:linear-gradient(100deg,#819db3 0%,#dceaf3 50%,#f7f8f4 120%);
      --theme-result:linear-gradient(180deg,#fff 0%,#dcecf7 48%,#91b8d2 100%);
    }
    body[data-theme="crimson"] {
      --theme-bg0:#080304; --theme-bg1:#16080b;
      --theme-panel:rgba(19,8,10,.88); --theme-panel-2:rgba(29,11,14,.96);
      --theme-accent:#c86570; --theme-accent-soft:#f0a3aa; --theme-metal:#d5ad65;
      --theme-text:#f5e9e9; --theme-muted:#aa9193;
      --theme-line:rgba(213,117,126,.16); --theme-line-strong:rgba(224,127,137,.42);
      --theme-glow:rgba(177,51,66,.14);
      --theme-button:linear-gradient(100deg,#8d2632 0%,#cf6671 48%,#dfba72 120%);
      --theme-result:linear-gradient(180deg,#fff1ef 0%,#e49aa1 46%,#a53d4a 100%);
    }
    body[data-theme="astral"] {
      --theme-bg0:#070510; --theme-bg1:#111027;
      --theme-panel:rgba(13,11,27,.86); --theme-panel-2:rgba(22,18,43,.96);
      --theme-accent:#a78ce8; --theme-accent-soft:#d6cbff; --theme-metal:#c8b6e9;
      --theme-text:#f1effb; --theme-muted:#a19bb8;
      --theme-line:rgba(173,150,235,.17); --theme-line-strong:rgba(187,166,247,.42);
      --theme-glow:rgba(100,83,191,.14);
      --theme-button:linear-gradient(100deg,#6651a3 0%,#aa91e8 48%,#d7cbf4 120%);
      --theme-result:linear-gradient(180deg,#fff 0%,#d6cbff 46%,#9782dc 100%);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; max-width: 100%; min-height: 100%; overflow-x: hidden; }
    html { color-scheme: dark; background: var(--theme-bg0); }
    body {
      margin: 0;
      color: var(--theme-text);
      font-family: Inter, "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 0%, var(--theme-glow), transparent 33%),
        radial-gradient(circle at 87% 13%, color-mix(in srgb, var(--theme-accent) 8%, transparent), transparent 29%),
        linear-gradient(145deg, var(--theme-bg0), var(--theme-bg1) 48%, var(--theme-bg0));
      transition: background .35s ease, color .35s ease;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .35;
      background-image:
        linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, #000, transparent 88%);
    }

    button, input { font: inherit; }
    button { color: inherit; -webkit-tap-highlight-color: transparent; }

    .app {
      position: relative;
      z-index: 1;
      width: min(1320px, calc(100vw - 28px));
      min-height: calc(100svh - 24px);
      margin: 12px auto;
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(310px, .76fr);
      gap: 18px;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--theme-line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(155deg, rgba(255,255,255,.035), transparent 36%),
        var(--theme-panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    body[data-theme="matte"] .panel,
    body[data-theme="matte"] .result-bar,
    body[data-theme="matte"] .theme-popover {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .stage-panel {
      display: grid;
      grid-template-rows: auto auto minmax(360px, 1fr) auto;
      min-height: calc(100svh - 24px);
    }

    .topbar {
      position: relative;
      z-index: 20;
      min-width: 0;
      padding: 16px 18px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--theme-line);
    }
    .brand { min-width: 0; display: flex; align-items: center; gap: 13px; }
    .sigil {
      flex: 0 0 auto;
      width: 48px; height: 48px;
      display: grid; place-items: center;
      position: relative;
      border: 1px solid var(--theme-line-strong);
      border-radius: 15px;
      background: linear-gradient(145deg, color-mix(in srgb, var(--theme-accent) 13%, transparent), rgba(255,255,255,.02));
      box-shadow: inset 0 0 25px var(--theme-glow);
    }
    .sigil::before, .sigil::after {
      content: ""; position: absolute; transform: rotate(45deg);
      border: 1px solid var(--theme-metal);
    }
    .sigil::before { width: 23px; height: 23px; opacity: .7; }
    .sigil::after { width: 11px; height: 11px; border-color: var(--theme-accent-soft); opacity: .8; }
    .brand h1 {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font: 700 clamp(21px, 3vw, 29px)/1 "Noto Serif SC", "Songti SC", serif;
      letter-spacing: .15em;
    }
    .brand p { margin: 5px 0 0; color: var(--theme-muted); font-size: 11px; letter-spacing: .12em; white-space: nowrap; }
    .top-actions { flex: 0 0 auto; display: flex; gap: 7px; }
    .icon-btn, .soft-btn {
      border: 1px solid var(--theme-line);
      border-radius: 13px;
      background: rgba(255,255,255,.025);
      cursor: pointer;
      transition: .18s ease;
    }
    .icon-btn { width: 41px; height: 41px; display: grid; place-items: center; }
    .soft-btn { min-height: 40px; padding: 0 13px; color: var(--theme-muted); font-size: 12px; }
    .icon-btn:hover, .soft-btn:hover { border-color: var(--theme-line-strong); background: color-mix(in srgb, var(--theme-accent) 8%, transparent); }

    .result-bar {
      position: relative;
      z-index: 3;
      min-width: 0;
      margin: 12px 16px 0;
      padding: 9px 14px;
      display: grid;
      grid-template-columns: minmax(105px,.72fr) minmax(70px,auto) minmax(160px,1.35fr);
      align-items: center;
      gap: 12px;
      border: 1px solid var(--theme-line);
      border-radius: 16px;
      background: linear-gradient(110deg, var(--theme-panel-2), color-mix(in srgb, var(--theme-panel) 76%, transparent));
      box-shadow: 0 10px 24px rgba(0,0,0,.2);
    }
    .formula {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--theme-accent-soft);
      text-align: center;
      font-size: 12px;
      letter-spacing: .1em;
      line-height: 1.45;
    }
    .result-total {
      min-width: 64px;
      text-align: center;
      font: 700 clamp(38px,4.8vw,57px)/.92 "Noto Serif SC", "Times New Roman", serif;
      color: transparent;
      background: var(--theme-result);
      background-clip: text;
      -webkit-background-clip: text;
      filter: drop-shadow(0 0 15px var(--theme-glow));
    }
    .result-detail {
      min-width: 0;
      color: var(--theme-muted);
      text-align: center;
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .result-detail.crit { color: var(--theme-metal); }
    .result-detail.fail { color: var(--danger); }

    .stage-wrap {
      position: relative;
      min-width: 0;
      min-height: 360px;
      overflow: hidden;
      background: radial-gradient(circle at 50% 100%, var(--theme-glow), transparent 45%);
    }
    #viewport { width: 100%; height: 100%; min-width: 0; display: block; touch-action: none; }

    .bottom-controls {
      min-width: 0;
      padding: 15px 17px 17px;
      display: grid;
      gap: 13px;
      border-top: 1px solid var(--theme-line);
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.08));
    }
    .section-label {
      margin: 0 0 8px;
      color: var(--theme-muted);
      font-size: 11px;
      letter-spacing: .12em;
    }

    .pool-row {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .pool-chips {
      min-width: 0;
      flex: 1;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      padding: 1px 0;
    }
    .pool-chips::-webkit-scrollbar { display: none; }
    .pool-empty { color: var(--theme-muted); font-size: 12px; padding: 8px 2px; white-space: nowrap; }
    .pool-chip {
      flex: 0 0 auto;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 9px 0 12px;
      border: 1px solid var(--theme-line);
      border-radius: 999px;
      background: rgba(255,255,255,.025);
      color: var(--theme-accent-soft);
      cursor: pointer;
    }
    .pool-chip.active { border-color: var(--theme-line-strong); background: color-mix(in srgb, var(--theme-accent) 10%, transparent); }
    .chip-remove { width: 20px; height: 20px; display: grid; place-items: center; border-radius: 50%; color: var(--theme-muted); background: rgba(255,255,255,.04); }

    .dice-types { min-width: 0; display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 8px; }
    .dice-btn, .mode-btn {
      position: relative;
      min-width: 0;
      min-height: 48px;
      border: 1px solid var(--theme-line);
      border-radius: 14px;
      background: linear-gradient(145deg,rgba(255,255,255,.035),rgba(255,255,255,.012));
      color: var(--theme-muted);
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .04em;
      transition: .18s ease;
    }
    .dice-btn.active, .dice-btn.in-pool, .mode-btn.active {
      color: var(--theme-accent-soft);
      border-color: var(--theme-line-strong);
      background: linear-gradient(145deg,color-mix(in srgb,var(--theme-accent) 14%,transparent),rgba(255,255,255,.018));
    }
    .dice-btn.active { box-shadow: inset 0 0 0 1px color-mix(in srgb,var(--theme-accent) 18%,transparent); }
    .dice-count-badge {
      position: absolute;
      top: 5px; right: 6px;
      min-width: 18px; height: 18px;
      padding: 0 5px;
      display: grid; place-items: center;
      border-radius: 999px;
      background: var(--theme-accent);
      color: var(--theme-bg0);
      font: 800 10px/1 Inter,sans-serif;
    }

    .config-row { min-width: 0; display: grid; grid-template-columns: 1fr 1fr 1.35fr; gap: 11px; }
    .field { min-width: 0; display: grid; gap: 7px; }
    .field label { min-width: 0; color: var(--theme-muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .field label strong { color: var(--theme-accent-soft); font-weight: 700; }
    .stepper {
      min-width: 0;
      height: 44px;
      display: grid;
      grid-template-columns: 38px minmax(30px,1fr) 38px;
      align-items: center;
      overflow: hidden;
      border: 1px solid var(--theme-line);
      border-radius: 13px;
      background: rgba(0,0,0,.16);
    }
    .stepper button { height: 100%; border: 0; background: transparent; color: var(--theme-accent-soft); font-size: 21px; cursor: pointer; }
    .stepper output { min-width: 0; text-align: center; font-weight: 700; font-variant-numeric: tabular-nums; }
    .input {
      width: 100%; min-width: 0; height: 44px;
      border: 1px solid var(--theme-line);
      border-radius: 13px;
      outline: none;
      background: rgba(0,0,0,.16);
      color: var(--theme-text);
      padding: 0 13px;
      font-weight: 700;
      letter-spacing: .025em;
    }
    .input:focus { border-color: var(--theme-line-strong); box-shadow: 0 0 0 3px var(--theme-glow); }
    .input.invalid { border-color: rgba(255,143,163,.65); }

    .action-row { min-width: 0; display: grid; grid-template-columns: 1fr auto auto; gap: 9px; align-items: end; }
    .mode-group { min-width: 260px; display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 7px; }
    .mode-btn { min-height: 42px; font-size: 12px; font-weight: 600; }
    .mode-btn:disabled { opacity: .32; cursor: not-allowed; }
    .roll-btn {
      position: relative;
      min-width: 210px;
      height: 56px;
      overflow: hidden;
      border: 0;
      border-radius: 17px;
      background: var(--theme-button);
      color: #130f08;
      cursor: pointer;
      box-shadow: 0 15px 36px var(--theme-glow),inset 0 1px 0 rgba(255,255,255,.55);
      font-weight: 900;
      letter-spacing: .16em;
    }
    .roll-btn:disabled { opacity: .68; cursor: default; }

    .side-panel {
      min-height: calc(100svh - 24px);
      padding: 17px;
      display: grid;
      grid-template-rows: auto auto minmax(180px,1fr) auto;
      gap: 11px;
    }
    .side-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .side-title { margin: 0; font: 700 18px/1 "Noto Serif SC",serif; letter-spacing: .11em; }
    .note-card { padding: 11px 13px; border: 1px solid var(--theme-line); border-radius: 15px; background: rgba(255,255,255,.018); color: var(--theme-muted); font-size: 11px; line-height: 1.7; }
    .history { min-height: 0; overflow: auto; display: grid; align-content: start; gap: 8px; padding-right: 2px; scrollbar-width: thin; scrollbar-color: var(--theme-line-strong) transparent; }
    .history-empty { min-height: 210px; display: grid; place-items: center; text-align: center; color: var(--theme-muted); font-size: 12px; line-height: 1.8; }
    .entry { min-width: 0; display: grid; grid-template-columns: 46px minmax(0,1fr) auto; gap: 10px; align-items: center; padding: 11px; border: 1px solid var(--theme-line); border-radius: 14px; background: rgba(255,255,255,.018); }
    .entry-total { width: 46px; height: 46px; display: grid; place-items: center; border-radius: 12px; background: color-mix(in srgb,var(--theme-accent) 11%,transparent); color: var(--theme-accent-soft); font-size: 18px; font-weight: 900; }
    .entry-main { min-width: 0; }
    .entry-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; font-weight: 700; }
    .entry-detail { margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--theme-muted); font-size: 10px; }
    .entry-time { align-self: start; color: var(--theme-muted); opacity: .7; font-size: 9px; }
    .footer-tip { color: var(--theme-muted); opacity: .72; font-size: 10px; text-align: center; line-height: 1.6; }

    .theme-popover {
      position: absolute;
      z-index: 50;
      top: 72px; right: 16px;
      width: min(385px,calc(100% - 32px));
      padding: 13px;
      visibility: hidden;
      opacity: 0;
      transform: translateY(-7px) scale(.98);
      transform-origin: top right;
      border: 1px solid var(--theme-line-strong);
      border-radius: 19px;
      background: var(--theme-panel-2);
      box-shadow: 0 24px 60px rgba(0,0,0,.48);
      transition: .18s ease;
    }
    .theme-popover.open { visibility: visible; opacity: 1; transform: none; }
    .theme-popover-head { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .theme-popover-head strong { display: block; font-family: "Noto Serif SC",serif; letter-spacing: .09em; }
    .theme-popover-head span { display: block; margin-top: 3px; color: var(--theme-muted); font-size: 10px; }
    .theme-close { width: 31px; height: 31px; border: 1px solid var(--theme-line); border-radius: 10px; background: transparent; color: var(--theme-muted); cursor: pointer; font-size: 19px; }
    .theme-grid { display: grid; gap: 7px; }
    .theme-card { width: 100%; min-height: 56px; display: grid; grid-template-columns: 44px 1fr; align-items: center; gap: 10px; padding: 7px 9px; border: 1px solid var(--theme-line); border-radius: 13px; background: rgba(255,255,255,.016); text-align: left; cursor: pointer; }
    .theme-card.active { border-color: var(--theme-line-strong); background: color-mix(in srgb,var(--theme-accent) 9%,transparent); }
    .theme-swatch { position: relative; width: 42px; height: 42px; overflow: hidden; border: 1px solid rgba(255,255,255,.14); border-radius: 12px; }
    .theme-swatch i { position:absolute; width:16px; height:16px; left:12px; top:12px; transform:rotate(45deg); border:1px solid rgba(255,255,255,.6); }
    .swatch-matte { background:linear-gradient(145deg,#050505,#19160f 65%,#a17b36); }
    .swatch-jade { background:linear-gradient(145deg,#071014,#173c34 65%,#8fe6c8); }
    .swatch-moon { background:linear-gradient(145deg,#0c111b,#526b80 65%,#eaf6ff); }
    .swatch-crimson { background:linear-gradient(145deg,#0b0304,#5b1720 65%,#d9a85f); }
    .swatch-astral { background:linear-gradient(145deg,#080613,#382b72 65%,#b89df1); }
    .theme-copy b { display:block; font-size:12px; }
    .theme-copy small { display:block; margin-top:3px; color:var(--theme-muted); font-size:10px; }

    .toast {
      position: fixed;
      z-index: 100;
      left: 50%; bottom: max(22px,env(safe-area-inset-bottom));
      transform: translate(-50%,14px);
      max-width: calc(100vw - 28px);
      padding: 10px 13px;
      border: 1px solid var(--theme-line-strong);
      border-radius: 12px;
      background: var(--theme-panel-2);
      color: var(--theme-accent-soft);
      box-shadow: 0 14px 34px rgba(0,0,0,.38);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      font-size: 12px;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translate(-50%,0); }

    @media (max-width: 1040px) {
      .app { min-height: auto; grid-template-columns: 1fr; }
      .stage-panel { min-height: auto; }
      .side-panel { min-height: 330px; max-height: 520px; }
    }

    @media (max-width: 720px) {
      :root { --radius-xl: 20px; }
      body { padding-bottom: max(8px,env(safe-area-inset-bottom)); }
      .app {
        width: calc(100vw - 12px);
        margin: 6px auto;
        gap: 10px;
      }
      .panel { border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,.3); }
      .stage-panel {
        grid-template-rows: auto auto clamp(280px,42svh,380px) auto;
      }
      .topbar { padding: 11px 10px 10px; gap: 7px; }
      .brand { gap: 9px; }
      .sigil { width: 40px; height: 40px; border-radius: 12px; }
      .sigil::before { width: 19px; height: 19px; }
      .sigil::after { width: 9px; height: 9px; }
      .brand h1 { font-size: 21px; letter-spacing: .12em; }
      .brand p { display: none; }
      .top-actions { gap: 5px; }
      .icon-btn { width: 35px; height: 35px; border-radius: 11px; font-size: 13px; }
      .top-actions .icon-btn:nth-of-type(2) { display: none; }

      .result-bar {
        margin: 7px 8px 0;
        padding: 7px 8px;
        grid-template-columns: minmax(72px,.72fr) 55px minmax(90px,1.3fr);
        gap: 7px;
        border-radius: 13px;
      }
      .formula { font-size: 10px; letter-spacing: .055em; }
      .result-total { min-width: 52px; font-size: 37px; }
      .result-detail { font-size: 10px; line-height: 1.4; -webkit-line-clamp: 2; }

      .stage-wrap { min-height: 0; }
      #viewport { min-height: 0; }
      .bottom-controls { padding: 12px 10px 13px; gap: 11px; }
      .section-label { margin-bottom: 7px; font-size: 10px; }
      .pool-row { gap: 6px; }
      .pool-chip { min-height: 33px; padding-left: 10px; font-size: 11px; }
      .soft-btn { min-height: 36px; padding: 0 10px; font-size: 10px; border-radius: 11px; }

      .dice-types { grid-template-columns: repeat(3,minmax(0,1fr)); gap: 7px; }
      .dice-btn { min-height: 45px; font-size: 13px; }
      .dice-count-badge { top: 4px; right: 5px; }
      .config-row { grid-template-columns: 1fr 1fr; gap: 8px; }
      .config-row .formula-field { grid-column: 1 / -1; }
      .stepper, .input { height: 42px; }
      .field label { font-size: 10px; }

      .action-row { grid-template-columns: 1fr; gap: 8px; }
      .mode-group { min-width: 0; }
      .mode-btn { min-height: 39px; }
      .action-row > .soft-btn { display: none; }
      .roll-btn { width: 100%; min-width: 0; height: 53px; }

      .theme-popover { top: 58px; right: 6px; width: calc(100% - 12px); padding: 11px; }
      .theme-grid { grid-template-columns: 1fr 1fr; }
      .theme-card { min-height: 52px; grid-template-columns: 38px 1fr; gap: 8px; padding: 6px 7px; }
      .theme-swatch { width: 36px; height: 36px; }
      .theme-swatch i { left:10px; top:10px; width:14px; height:14px; }
      .theme-copy small { display: none; }

      .side-panel { min-height: 300px; max-height: 440px; padding: 13px 10px; gap: 9px; }
      .note-card { font-size: 10px; }
      .footer-tip { font-size: 9px; }
    }

    @media (max-width: 390px) {
      .brand h1 { font-size: 19px; }
      .top-actions .icon-btn:nth-of-type(3) { display: none; }
      .result-bar { grid-template-columns: 70px 51px minmax(76px,1fr); }
      .theme-grid { grid-template-columns: 1fr; }
    }

    @media (orientation: landscape) and (max-height: 650px) {
      .app { min-height: auto; }
      .stage-panel { grid-template-rows: auto auto minmax(250px,1fr) auto; }
      .stage-wrap { min-height: 250px; }
    }

</head>
<body data-theme="matte">
  <main class="app">
    <section class="panel stage-panel">
      <header class="topbar">
        <div class="brand">
          <div class="sigil" aria-hidden="true"></div>
          <div>
            <h1>命运骰桌</h1>
            <p>混合骰池 · 真实物理 · 多主题预设</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="themeBtn" title="切换风格" aria-label="切换风格">◈</button>
          <button class="icon-btn" id="copyBtn" title="复制结果" aria-label="复制结果">⧉</button>
          <button class="icon-btn" id="soundBtn" title="音效开关" aria-label="音效开关">♪</button>
          <button class="icon-btn" id="resetCamBtn" title="重置视角" aria-label="重置视角">◌</button>
        </div>

        <div class="theme-popover" id="themePopover" aria-hidden="true">
          <div class="theme-popover-head">
            <div><strong>视觉预设</strong><span>骰子材质、光线和界面会一同变化</span></div>
            <button class="theme-close" id="themeClose" aria-label="关闭主题面板">×</button>
          </div>
          <div class="theme-grid">
            <button class="theme-card" data-theme-choice="matte"><span class="theme-swatch swatch-matte"><i></i></span><span class="theme-copy"><b>黑金哑光</b><small>炭黑、旧金与低反光</small></span></button>
            <button class="theme-card" data-theme-choice="jade"><span class="theme-swatch swatch-jade"><i></i></span><span class="theme-copy"><b>翡翠秘仪</b><small>冷绿幽光与鎏金</small></span></button>
            <button class="theme-card" data-theme-choice="moon"><span class="theme-swatch swatch-moon"><i></i></span><span class="theme-copy"><b>月白霜银</b><small>雾蓝、银白与月光</small></span></button>
            <button class="theme-card" data-theme-choice="crimson"><span class="theme-swatch swatch-crimson"><i></i></span><span class="theme-copy"><b>绯夜赤金</b><small>暗红、旧金与戏剧感</small></span></button>
            <button class="theme-card" data-theme-choice="astral"><span class="theme-swatch swatch-astral"><i></i></span><span class="theme-copy"><b>星穹紫晶</b><small>深紫、星蓝与晶光</small></span></button>
          </div>
        </div>
      </header>

      <section class="result-bar" aria-live="polite">
        <div class="formula" id="formulaLabel">1D20</div>
        <div class="result-total" id="resultTotal">20</div>
        <div class="result-detail" id="resultDetail">命运尚未落定</div>
      </section>

      <div class="stage-wrap">
        <canvas id="viewport"></canvas>
      </div>

      <section class="bottom-controls">
        <div>
          <p class="section-label">当前骰池</p>
          <div class="pool-row">
            <div class="pool-chips" id="poolChips"></div>
            <button class="soft-btn" id="clearPoolBtn">清空骰池</button>
          </div>
        </div>

        <div>
          <p class="section-label">选择骰种：点击空骰种会自动加入 1 枚</p>
          <div class="dice-types" id="diceTypes">
            <button class="dice-btn" data-type="d4">D4<span class="dice-count-badge" hidden>0</span></button>
            <button class="dice-btn" data-type="d6">D6<span class="dice-count-badge" hidden>0</span></button>
            <button class="dice-btn" data-type="d8">D8<span class="dice-count-badge" hidden>0</span></button>
            <button class="dice-btn" data-type="d10">D10<span class="dice-count-badge" hidden>0</span></button>
            <button class="dice-btn" data-type="d12">D12<span class="dice-count-badge" hidden>0</span></button>
            <button class="dice-btn" data-type="d20">D20<span class="dice-count-badge" hidden>0</span></button>
            <button class="dice-btn" data-type="d100">D100<span class="dice-count-badge" hidden>0</span></button>
          </div>
        </div>

        <div class="config-row">
          <div class="field">
            <label><strong id="selectedTypeLabel">D20</strong> 数量</label>
            <div class="stepper">
              <button type="button" data-step="selected-count" data-delta="-1" aria-label="减少当前骰种">−</button>
              <output id="selectedCountOut">1</output>
              <button type="button" data-step="selected-count" data-delta="1" aria-label="增加当前骰种">＋</button>
            </div>
          </div>
          <div class="field">
            <label>结果修正</label>
            <div class="stepper">
              <button type="button" data-step="modifier" data-delta="-1">−</button>
              <output id="modifierOut">0</output>
              <button type="button" data-step="modifier" data-delta="1">＋</button>
            </div>
          </div>
          <div class="field formula-field">
            <label for="formulaInput">混合公式，例如 2d6+1d8+3</label>
            <input class="input" id="formulaInput" autocomplete="off" spellcheck="false" value="1d20" />
          </div>
        </div>

        <div class="action-row">
          <div>
            <p class="section-label">优势 / 劣势仅在骰池为 1D20 时生效</p>
            <div class="mode-group" id="modeGroup">
              <button class="mode-btn active" data-mode="normal">普通</button>
              <button class="mode-btn" data-mode="advantage">优势</button>
              <button class="mode-btn" data-mode="disadvantage">劣势</button>
            </div>
          </div>
          <button class="soft-btn" id="clearStageBtn">清理桌面</button>
          <button class="roll-btn" id="rollBtn">掷下命运</button>
        </div>
      </section>
    </section>

    <aside class="panel side-panel">
      <div class="side-head"><h2 class="side-title">判定记录</h2><button class="soft-btn" id="clearHistoryBtn">清空</button></div>
      <div class="note-card">现在可以同时投掷不同类型：先点击 D6 加入骰池，再点击 D8，分别用数量加减调整；也可以直接输入 <strong>2d6+1d8+1d20+3</strong>。</div>
      <div class="history" id="history"></div>
      <div class="footer-tip">D100 仍由两枚 D10 真实碰撞后组合。一次最多投掷 14 枚实体骰子。</div>
    </aside>
  </main>
